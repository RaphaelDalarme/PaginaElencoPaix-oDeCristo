<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso Restrito - Produção</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .login-box { background: #111; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        input { padding: 15px; border-radius: 10px; border: none; width: 100%; margin: 20px 0; background: #222; color: #fff; }
        button { background: #ae2012; color: white; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔒 Acesso Restrito</h2>
        <p>Insira a senha da Direção de Arte</p>
        <form method="POST">
            <input type="password" name="password" placeholder="Senha" autofocus>
            <button type="submit">ENTRAR NO SISTEMA</button>
        </form>
        {% with messages = get_flashed_messages() %}
          {% if messages %}<p style="color: #ff4d4d; margin-top: 15px;">{{ messages[0] }}</p>{% endif %}
        {% endwith %}
    </div>
</body>
</html>
